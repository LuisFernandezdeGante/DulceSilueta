<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Carrito</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <div class="container py-5">

        
            <div class="banner-container mb-4">
            <img src="../img/carrito.png" alt="Productos" class="banner-productos">
        </div>


        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <a href="productos.html"
                class="btn btn-dark">

                Seguir comprando

            </a>

        </div>

        <!-- PRODUCTOS -->
        <div id="cart-items"
            class="row g-4">

        </div>

        <!-- TOTAL -->
        <div class="mt-5 text-end">

            <h3 id="cart-total">

                Total: $0 MXN

            </h3>

        </div>

        <!-- BOTONES -->
        <div class="cart-actions mt-4 d-flex justify-content-end gap-3">

            <button class="btn btn-danger"
                onclick="clearCart()">

                Vaciar carrito

            </button>

            <button class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#paymentModal">

                Finalizar compra

            </button>

        </div>

    </div>

    <!-- MODAL -->
    <div class="modal fade"
        id="paymentModal"
        tabindex="-1">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">

                    <h5 class="modal-title">

                        Formulario de Pago

                    </h5>

                    <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <!-- BODY -->
                <div class="modal-body">

                    <form id="paymentForm">

                        <!-- NOMBRE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Nombre completo

                            </label>

                            <input type="text"
                                class="form-control"
                                required>

                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">

                            <label class="form-label">

                                Correo electrónico

                            </label>

                            <input type="email"
                                class="form-control"
                                required>

                        </div>

                        <!-- DIRECCION -->
                        <div class="mb-3">

                            <label class="form-label">

                                Dirección de envío

                            </label>

                            <textarea class="form-control"
                                rows="3"
                                required></textarea>

                        </div>

                        <!-- TARJETA -->
                        <div class="mb-3">

                            <label class="form-label">

                                Número de tarjeta

                            </label>

                            <input type="text"
                                class="form-control"
                                placeholder="1234 5678 9012 3456"
                                required>

                        </div>

                        <!-- FILA -->
                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Fecha de expiración

                                </label>

                                <input type="text"
                                    class="form-control"
                                    placeholder="MM/AA"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    CVV

                                </label>

                                <input type="text"
                                    class="form-control"
                                    placeholder="123"
                                    required>

                            </div>

                        </div>

                        <!-- BOTON -->
                        <button type="submit"
                            class="btn btn-success w-100">

                            Confirmar Pago

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        function loadCart() {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            let container = document.getElementById("cart-items");

            let total = 0;

            container.innerHTML = "";

            cart.forEach((product, index) => {

                total += product.price;

                container.innerHTML += `

                <div class="col-md-4">

                    <div class="card shadow-sm h-100">

                        <img src="${product.image}"
                            class="card-img-top">

                        <div class="card-body">

                            <h5>${product.name}</h5>

                            <p>

                                <strong>Talla:</strong> ${product.size}

                            </p>

                            <p class="price">

                                $${product.price} MXN

                            </p>

                            <button class="btn btn-danger w-100"
                                onclick="removeItem(${index})">

                                Eliminar

                            </button>

                        </div>

                    </div>

                </div>

                `;
            });

            document.getElementById("cart-total")
                .textContent = `Total: $${total} MXN`;
        }

        /* ELIMINAR */
        function removeItem(index) {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.splice(index, 1);

            localStorage.setItem("cart", JSON.stringify(cart));

            loadCart();
        }

        /* VACIAR */
        function clearCart() {

            localStorage.removeItem("cart");

            loadCart();
        }

        /* FORMULARIO */
        document.addEventListener("DOMContentLoaded", () => {

            document.getElementById("paymentForm")
                .addEventListener("submit", function (e) {

                    e.preventDefault();

                    alert("✅ Compra realizada correctamente");

                    localStorage.removeItem("cart");

                    loadCart();

                    bootstrap.Modal.getInstance(
                        document.getElementById("paymentModal")
                    ).hide();
                });
        });

        loadCart();

    </script>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
